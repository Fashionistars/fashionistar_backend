    post:
      operationId: v1_auth_resend_otp_create
      description: |-
        POST /api/v1/auth/resend-otp/

        Regenerate and resend a 6-digit OTP code.

        Flow:
          1. Validate user existence by email or phone.
          2. Regenerate a new secure OTP code.
