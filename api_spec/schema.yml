  /api/v1/transactions/{transaction_id}/refund/:
    post:
      operationId: v1_transactions_refund_create
      description: |-
        Initiates a manual refund for an escrowed payment.
        POST /api/v1/transactions/<transaction_id>/refund/
        Initiate a refund for a transaction on escrow hold.
        Flow:
          1. Verify the transaction is currently held in Escrow.
          2. Reverse the hold back to the client's available balance.
          3. Log the refund event in the transaction history.

        Status Codes:
          200 OK: Refund successfully processed.
          400 Bad Request: Transaction not eligible for refund.
      parameters:
      - in: path
        name: transaction_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
