        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        country:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 20
        is_default:
          type: boolean
          description: True if this is the primary address shown at checkout.
      required:
      - city
      - state
      - street_address
    AddressCreateRequest:
      type: object
      description: Input serializer for POST /addresses/.
      properties:
        label:
          type: string
          description: 'Short label: ''Home'', ''Office'', or ''Mum\''s place''.'
          maxLength: 80
        full_name:
          type: string
          maxLength: 150
        phone:
          type: string
          maxLength: 30
        street_address:
          type: string
          minLength: 1
          description: Street, house number, landmark.
        city:
          type: string
          minLength: 1
          maxLength: 100
        state:
          type: string
          minLength: 1
          maxLength: 100
        country:
          type: string
          minLength: 1
          maxLength: 100
        postal_code:
          type: string
          maxLength: 20
        is_default:
          type: boolean
          description: True if this is the primary address shown at checkout.
      required:
      - city
      - state
      - street_address
    AnalyticsVendorProductList:
      type: object
      properties:
        id:
          type: string
        pid:
          type: string
        title:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        stock_qty:
          type: integer
        status:
          type: string
        category__name:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
      required:
      - category__name
      - date
      - id
      - pid
      - price
      - status
      - stock_qty
      - title
    AssetTypeEnum:
      enum:
      - avatar
      - blog
      - brand
      - category
      - chat_file
      - collection
      - generic_image
      - generic_video
      - measurement
      - product_color
      - product_gallery
      - product_image
      - product_video
      - profile
      - vendor_shop
      type: string
    AuthGoogleAuth:
      type: object
      description: |-
        Serializer for Google ID Token authentication.

        Flow:
            Login (existing user): { id_token }  — role is optional, ignored
            Register (new user):   { id_token, role: 'vendor'|'client' }
      properties:
        id_token:
          type: string
          description: Google ID Token (JWT) returned by @react-oauth/google on the
            frontend.
        role:
          default: client
          description: User's role — required for new registrations, ignored for existing
            users.
          oneOf:
          - $ref: '#/components/schemas/RoleC2fEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - id_token
    AuthGoogleAuthRequest:
      type: object
      description: |-
        Serializer for Google ID Token authentication.

        Flow:
            Login (existing user): { id_token }  — role is optional, ignored
            Register (new user):   { id_token, role: 'vendor'|'client' }
      properties:
        id_token:
          type: string
          minLength: 1
          description: Google ID Token (JWT) returned by @react-oauth/google on the
            frontend.
        role:
          default: client
          description: User's role — required for new registrations, ignored for existing
            users.
          oneOf:
          - $ref: '#/components/schemas/RoleC2fEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - id_token
    AuthLoginRequest:
      type: object
      description: |-
        Serializer for authenticating users with either email or phone.

        Enterprise-grade auth flow (priority order):

        1. Alive-only lookup (is_deleted=False)
        2. Soft-deleted pool check → SoftDeletedUserError (403)
        3. Password check → InvalidCredentialsError (401)
        4a. is_verified check FIRST → AccountNotVerifiedError (403) with OTP URLs
        4b. is_active check SECOND → AccountDeactivatedError (403) with support URL
        Serializer for user authentication via Email or Phone.

        Validation Logic:
          1. Normalise input identifier (email to lowercase).
          2. Verify user exists and is not soft-deleted.
          3. Verify password hash matches.
          4. Check account lifecycle status (verified, active).

        Security:
          - Uses Django's `check_password` for constant-time comparison.
          - Throttled at the View level to prevent brute-force.
      properties:
        email_or_phone:
          type: string
          writeOnly: true
          minLength: 1
          description: User's email or phone for login
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: User's password
      required:
      - email_or_phone
      - password
    AuthLogout:
      type: object
      description: Accepts the refresh token to blacklist on logout.
      properties:
        refresh:
          type: string
          description: Refresh token to blacklist on logout.
      required:
      - refresh
    AuthLogoutRequest:
      type: object
      description: Accepts the refresh token to blacklist on logout.
      properties:
        refresh:
          type: string
          minLength: 1
          description: Refresh token to blacklist on logout.
      required:
      - refresh
    AuthMe:
      type: object
      description: |-
        Serializes the authenticated user's profile for the /auth/me/ endpoint.

        This serializer's output shape is the authoritative contract between
        the backend and the frontend Zustand auth store (useAuthHydration).

        Field-by-field null/blank behaviour:
          user_id          → str (UUID)
          identifying_info → str (email or phone or fallback string)
          member_id        → str | null  (null only before first save race, practically never)
          email            → str | null  (null for phone-only accounts)
          phone            → str | null  (null for email-only accounts, E.164 format)
          first_name       → str         (empty string "" when not set — model blank=True)
          last_name        → str         (empty string "" when not set — model blank=True)
          role             → str         (choices: client | vendor | staff | admin | …)
          auth_provider    → str         (choices: email | phone | google)
          is_verified      → bool
          is_active        → bool
          is_staff         → bool
          avatar           → str | null  (full Cloudinary HTTPS URL or null)
