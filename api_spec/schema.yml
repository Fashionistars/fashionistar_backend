          description: User's country.
          maxLength: 100
        state:
          type: string
          description: User's state or province.
          maxLength: 100
        city:
          type: string
          description: User's city.
          maxLength: 100
        address:
          type: string
          description: User's street address.
          maxLength: 255
        avatar:
          type: string
          minLength: 1
          nullable: true
          description: 'Cloudinary image public_id. Set via the /api/v1/upload/presign/
            → direct upload → webhook flow. Use .url in serializers to retrieve the
            full HTTPS secure_url. In admin: use the file picker widget to upload
            directly to Cloudinary.'
