      description: |-
        POST /api/v1/auth/login/

        Synchronous Login — email/phone + password → JWT tokens.

        Success Response 200:
            { "access": "<JWT>", "refresh": "<JWT>", "user_id": "...", "role": "..." }
        Cookie:
            fashionistar_rt (HttpOnly) → refresh token

