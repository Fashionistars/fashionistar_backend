    UserSession:
      type: object
      description: |-
        Read serializer for UserSession — used by the active sessions list.

        All UUID7 primary keys are serialized as strings (required for
        JavaScript, which cannot safely handle 128-bit integers).

        The ``is_current`` flag is computed dynamically at query time
        (via the view injecting the current JTI), so it is read-only here.

        The ``is_expired`` flag is a computed property (not stored in DB).
      properties:
        id:
          type: string
          readOnly: true
        device_name:
          type: string
          readOnly: true
          description: Human-readable label such as 'Chrome on Windows'.
        client_type:
          allOf:
          - $ref: '#/components/schemas/UserSessionClientTypeEnum'
          readOnly: true
          description: Browser / mobile app / API client.
        browser:
          type: string
          readOnly: true
        os:
          type: string
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
          description: IP address captured at session creation time.
        country:
          type: string
          readOnly: true
        city:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_current:
          type: boolean
          description: |-
            True when the session's JTI matches the current request's access token JTI.

            The view must pass `current_jti` in serializer context:
                serializer = UserSessionSerializer(
                    sessions, many=True, context={"current_jti": current_jti}
                )
          readOnly: true
        is_expired:
          type: boolean
          description: True when the session's refresh token has expired.
          readOnly: true
      required:
      - browser
      - city
      - client_type
      - country
      - created_at
      - device_name
      - expires_at
      - id
      - ip_address
      - is_current
      - is_expired
      - last_used_at
      - os
