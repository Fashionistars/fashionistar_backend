    LoginEvent:
      type: object
      description: |-
        Read serializer for LoginEvent — used by the login activity list.

        Analogous to Binance's "Login Activity" or Google's
        "Recent Security Events" dashboard panel.

        All UUID7 primary keys are serialized as strings.
        ``timestamp`` is an alias for ``created_at`` (audit-log convention).
      properties:
        id:
          type: string
          readOnly: true
        outcome:
          allOf:
          - $ref: '#/components/schemas/OutcomeEnum'
          readOnly: true
          description: Result of the login attempt.
        is_successful:
          type: boolean
          readOnly: true
          description: True iff the login attempt succeeded and tokens were issued.
        failure_reason:
          type: string
          readOnly: true
          description: 'Short machine-readable failure code: ''invalid_credentials'',
            ''account_inactive'', ''account_deleted'', ''rate_limited'', ''mfa_required'',
            etc.'
        auth_method:
          allOf:
          - $ref: '#/components/schemas/AuthMethodEnum'
          readOnly: true
          description: Authentication method used for this attempt.
        ip_address:
          type: string
          readOnly: true
          description: Client IP address (supports IPv4 and IPv6).
        country:
          type: string
          readOnly: true
          description: Country name derived from IP (via MaxMind / ipapi).
        country_code:
          type: string
          readOnly: true
          description: ISO 3166-1 alpha-2 country code (e.g. 'NG', 'US').
        city:
          type: string
          readOnly: true
          description: City name (e.g. 'Lagos', 'San Francisco').
        client_type:
          allOf:
          - $ref: '#/components/schemas/LoginEventClientTypeEnum'
          readOnly: true
          description: 'Derived from User-Agent: web / mobile / api / curl.'
        browser:
          type: string
          readOnly: true
        os:
          type: string
          readOnly: true
        device_type:
          type: string
          readOnly: true
          description: 'Device category: desktop, mobile, tablet, bot, etc.'
        risk_score:
          type: integer
          readOnly: true
          description: Risk score 0-100. ≥70 triggers a security alert.
        is_new_device:
          type: boolean
          readOnly: true
          description: True if this is the first time this device fingerprint was
            seen.
        is_new_country:
          type: boolean
          readOnly: true
          description: True if the login country is new for this user.
        is_tor_exit_node:
          type: boolean
          readOnly: true
          description: True if the IP is a known Tor exit node.
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - auth_method
      - browser
      - city
      - client_type
      - country
      - country_code
      - device_type
      - failure_reason
      - id
      - ip_address
      - is_new_country
      - is_new_device
      - is_successful
      - is_tor_exit_node
      - os
      - outcome
      - risk_score
      - timestamp
    LoginEventClientTypeEnum:
      enum:
      - web
      - mobile
      - api
      - curl
      - unknown
      type: string
    OutcomeEnum:
      enum:
      - success
      - failed
      - blocked
      - suspicious
      type: string
    OwnerTypeEnum:
      enum:
      - client
      - vendor
      - support
      - editor
      - moderator
      - admin
      - company
      type: string
