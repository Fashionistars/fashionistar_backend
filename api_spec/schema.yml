    **v1 (DRF/Sync):** Standard REST endpoints, WSGI-safe, Celery-backed.
    **v1 (Ninja/Async):** High-concurrency async endpoints, ASGI-native.

    **Authentication:** Bearer JWT (SimpleJWT). Get tokens via `/api/v1/auth/login/`.
    **Register first:** `POST /api/v1/auth/register/` → verify OTP → login.
