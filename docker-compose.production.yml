# ============================================================================
# FASHIONISTAR — Production Docker Compose (Oracle Cloud Always Free VM)
# ============================================================================
# Deploys on: Oracle Cloud VM.Standard.A1.Flex (2 OCPUs / 12 GB RAM / ARM64)
#
# Services on Oracle (THIS FILE):
#   nginx      — Reverse proxy + SSL termination (Let's Encrypt)
#   api        — Django ASGI via Gunicorn + UvicornWorker  (separate API logs)
#   redis      — Redis 7 (cache + Celery broker for Northflank workers)
#   keepalive  — Oracle idle-prevention pinger (every 4 minutes)
#
# Services on Northflank (northflank.json):
#   celery_worker  — All background task queues  (separate Celery logs)
#   celery_beat    — Celery Beat scheduler (cron job)
#   managed_redis  — Northflank Redis addon (optional secondary broker)
#
# IMPORTANT:
#   ❌ NO postgres container here — use your EXTERNAL production database
#      (Neon, Supabase, Railway Postgres, or Oracle ADB) via DATABASE_URL
#   ✅ Separate log volume for API logs (/app/logs/api/)
#   ✅ Redis is the Celery broker — Northflank workers connect via REDIS_URL
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml pull && \
#     docker compose -f docker-compose.production.yml up -d --no-deps api
# ============================================================================

version: '3.9'

services:

  # ── Nginx: Reverse proxy + SSL + Static files ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fashionistar_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/mediafiles:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - fashionistar_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Django ASGI API Gateway ─────────────────────────────────────────────────
  # Separate from Celery — has its own log volume (api_logs)
  # All API request/error logs go to: /app/logs/api/
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-fashionistar-clothings/fashionistar_backend}/api:${IMAGE_TAG:-latest}
    container_name: fashionistar_api
    pull_policy: always
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=backend.config.production
      - PORT=8001
      # Oracle Cloud: 2 OCPUs → 4 Gunicorn workers (2×CPU formula for I/O-bound)
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=300
      - GUNICORN_KEEPALIVE=75
      - GUNICORN_LOG_LEVEL=info
      # Redis (local Oracle Redis — also exposed to Northflank Celery workers)
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
      # Log to separate directory so API logs don't mix with Celery logs
      - LOG_DIR=/app/logs/api
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
      # Dedicated API log volume — separate from Celery
      - api_logs:/app/logs/api
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 6G
        reservations:
          cpus: '0.5'
          memory: 2G
    networks:
      - fashionistar_net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "fashionistar-api"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Redis 7 (Django Cache + Celery Broker) ───────────────────────────────────
  # Also serves as the Celery broker that Northflank workers connect to.
  # Northflank workers must use: CELERY_BROKER_URL=redis://:PASSWORD@<ORACLE_IP>:6379/1
  # Ensure port 6379 is open in Oracle VCN Security List for Northflank IPs.
  redis:
    image: redis:7-alpine
    container_name: fashionistar_redis
    # Expose port 6379 publicly so Northflank Celery workers can connect as broker
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --requirepass ${REDIS_PASSWORD}
      --tcp-keepalive 300
      --loglevel notice
      --logfile /data/redis.log
    volumes:
      - redis_data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 1.2G
        reservations:
          cpus: '0.05'
          memory: 256M
    networks:
      - fashionistar_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "fashionistar-redis"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Oracle Keep-Alive (Idle Prevention) ─────────────────────────────────────
  # Oracle reclaims Always Free instances if CPU < 10% for 7 consecutive days.
  # This lightweight pinger prevents idle reclamation at zero CPU cost.
  keepalive:
    image: curlimages/curl:8-alpine
    container_name: fashionistar_keepalive
    command: >
      sh -c "while true; do
        curl -fsS http://api:8001/health/ > /dev/null 2>&1 || true;
        sleep 240;
      done"
    depends_on:
      - api
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M
    networks:
      - fashionistar_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    name: fashionistar_redis_data
  static_files:
    name: fashionistar_static_files
  media_files:
    name: fashionistar_media_files
  # Dedicated API log volume (Django ASGI gateway logs only)
  api_logs:
    name: fashionistar_api_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/log/fashionistar/api
  # Nginx access/error logs
  nginx_logs:
    name: fashionistar_nginx_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/log/fashionistar/nginx

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  fashionistar_net:
    name: fashionistar_production_net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
