# ============================================================================
# FASHIONISTAR — Nginx Production Configuration
# Oracle Cloud ARM VM | api.fashionistar.net
# ============================================================================

# Upstream: Django ASGI (Gunicorn + UvicornWorker) inside Docker network
upstream django_asgi {
    server api:8001;
    keepalive 64;       # Persistent HTTP/1.1 keepalive to Django
    keepalive_timeout 300s;
}

# ── Rate-limit zones ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:20m    rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:5m  rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.fashionistar.net fashionistar.net www.fashionistar.net;

    # Allow Let's Encrypt ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # All other HTTP → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Production Server ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.fashionistar.net;

    # ── SSL (Let's Encrypt via Certbot) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.fashionistar.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fashionistar.net/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.fashionistar.net/chain.pem;

    # Modern SSL configuration (TLS 1.2 + 1.3 only)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; connect-src 'self'; img-src 'self' data: https://res.cloudinary.com; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;

    # ── Connection limits ────────────────────────────────────────────────────
    limit_conn conn_limit 30;
    client_max_body_size 50M;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml
        application/rss+xml;

    # ── Health Check (no rate limiting, no auth — must be fast) ─────────────
    location = /health/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
        limit_req off;
    }

    # ── Auth endpoints (stricter rate limiting) ──────────────────────────────
    location ~ ^/api/(v1|v2)/(auth|token|login|register|password)/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Media/File upload endpoints ──────────────────────────────────────────
    location ~ ^/api/(v1|v2)/(upload|media|measurements)/ {
        limit_req zone=upload_limit burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 50M;

        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;    # Allow up to 5 min for AI processing
        proxy_connect_timeout 30s;
        proxy_buffering off;
    }

    # ── General API routes ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket support (Django Channels) ─────────────────────────────────
    location /ws/ {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 1 hour for long-lived WebSocket connections
        proxy_send_timeout 3600s;
        proxy_buffering off;
        limit_req off;
    }

    # ── Static files (collected by Django collectstatic) ─────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        gzip_static on;
        access_log off;
    }

    # ── Media files (user uploads from Cloudinary — not served locally) ──────
    location /media/ {
        # Redirect to Cloudinary CDN for actual media files
        return 301 https://res.cloudinary.com/$request_uri;
    }

    # ── Deny access to sensitive paths ───────────────────────────────────────
    location ~ ^/(\.git|\.env|Dockerfile|docker-compose) {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/error.log warn;
}
