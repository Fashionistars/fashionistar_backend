# ============================================================================
# Nginx upstream: Django ASGI via Docker internal network
# ============================================================================
upstream django_asgi {
    server api:8001;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.fashionistar.net fashionistar.net www.fashionistar.net;

    # Let's Encrypt ACME challenge (must be accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Main API ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.fashionistar.net;

    # SSL — Let's Encrypt via Certbot
    ssl_certificate     /etc/letsencrypt/live/api.fashionistar.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fashionistar.net/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.fashionistar.net/chain.pem;

    # Modern SSL config (Mozilla Intermediate, 2024)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'none'; style-src 'none'; img-src 'none'; connect-src 'self'; font-src 'none'; frame-src 'none';" always;

    # ── Rate Limiting ───────────────────────────────────────────────────────
    # Define in nginx.conf: limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req zone=api_limit burst=30 nodelay;
    limit_req_status 429;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/xml
        text/css
        application/xml
        application/x-javascript
        image/svg+xml;
    gzip_min_length 1024;

    # Maximum upload size (for image uploads to Cloudinary)
    client_max_body_size 50M;
    client_body_timeout 120s;
    client_header_timeout 30s;

    # ── Health Check (no rate limit, no auth) ──────────────────────────────
    location /health/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        limit_req off;
        access_log off;
    }

    # ── DRF REST API ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;

        # Response caching for GET requests
        proxy_cache_bypass $http_pragma $http_authorization;
    }

    # ── WebSocket (Django Channels) ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering off;
    }

    # ── Django Admin ────────────────────────────────────────────────────────
    location /secure-admin/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        # Restrict admin to specific IPs (add your IPs here)
        # allow 1.2.3.4;
        # deny all;
    }

    # ── Static Files (WhiteNoise serves these via Django) ───────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        gzip_static on;
        access_log off;
    }

    # ── Media Files (Cloudinary handles these, but local fallback) ──────────
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Catch-all: block anything else ──────────────────────────────────────
    location / {
        return 404;
    }

    # Nginx access and error logs
    access_log /var/log/nginx/fashionistar_api_access.log combined;
    error_log  /var/log/nginx/fashionistar_api_error.log warn;
}
