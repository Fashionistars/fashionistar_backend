services:
  # Unified Django Web + Celery Worker + Celery Beat for Render Free Tier
  - type: web
    name: fashionistar-backend-free
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "./start.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.config.production
      - key: DEBUG
        value: "False"
      - key: PORT
        value: "8001"
      - key: ALLOWED_HOSTS
        value: "fashionistar-backend-free.onrender.com,localhost,127.0.0.1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
