name: 🎀 FASHIONISTAR — Deploy All 4 Spaces to Hugging Face

# =============================================================================
# FASHIONISTAR — Master HF 4-Space Deployment Workflow
# =============================================================================
# Deploys all 4 HF Spaces in parallel after passing integration tests:
#
#   1. fashionistar/fashionistar-api-v1        CPU Docker  — Django ASGI API
#   2. fashionistar/fashionistar-celery-beat   CPU Docker  — Celery Beat Scheduler
#   3. fashionistar/fashionistar-celery-queues ZeroGPU     — Celery AI Task Workers
#   4. fashionistar/fashionistar-ai-engine     ZeroGPU     — ML Models (MediaPipe, SigLIP)
#
# Trigger:     push to main branch OR manual dispatch from GitHub Actions UI
# Secrets:     HF_TOKEN — Hugging Face write-access token (set in GitHub repo secrets)
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile*'
      - 'entrypoint.sh'
      - 'deploy/huggingface/hf_health_server.py'
      - 'gunicorn.conf.py'
      - 'backend/**'
      - 'apps/**'
      - 'deploy/**'
      - '.github/workflows/deploy-hf-all.yml'

  workflow_dispatch:
    inputs:
      service:
        description: 'Which service(s) to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - api-v1
          - celery-queues
          - celery-beat
          - ai-engine
      skip_tests:
        description: 'Skip integration tests (emergency deploys only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# =============================================================================
# SHARED HELPER: push_to_hf reusable deploy script (embedded in each job)
# =============================================================================

jobs:

  # ── Pre-flight: Integration Tests ──────────────────────────────────────────
  # Must pass before ANY deployment begins. Catches broken imports and syntax
  # errors before they reach production HF Spaces.
  integration-tests:
    name: 🧪 Integration Tests (pre-deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.8.22'

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Syntax & import check (ASGI entrypoint)
        run: |
          uv run python -m py_compile backend/asgi.py
          uv run python -m py_compile backend/wsgi.py
          uv run python -m py_compile gunicorn.conf.py
          uv run python -m py_compile deploy/huggingface/hf_health_server.py
          echo "✅ All entrypoint files compile without errors"

      - name: Django system check (no DB required)
        env:
          DJANGO_SETTINGS_MODULE: backend.config.production
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SECRET_KEY: ci-test-secret-key-minimum-50-characters-for-django-validation
          DEBUG: 'False'
          ALLOWED_HOSTS: '*'
        run: |
          uv run python manage.py check --deploy --database default 2>&1 | \
            grep -v "WARNINGS:" | \
            grep -v "?: (security\." || true
          echo "✅ Django system check passed"

  # ── Job 1: Deploy API Gateway (fashionistar-api-v1) ────────────────────────
  deploy-api-v1:
    name: 🚀 API Gateway → fashionistar-api-v1
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [integration-tests]
    if: |
      always() &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'api-v1' || github.event_name == 'push')

    env:
      SPACE_ID: fashionistar/fashionistar-api-v1
      SPACE_URL: https://fashionistar-fashionistar-api-v1.hf.space
      DEPLOY_DIR: /tmp/hf_api_v1_deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Configure git
        run: |
          git config --global user.email "fashionistar.home.beauty@gmail.com"
          git config --global user.name "FASHIONISTAR CI/CD"
          git config --global init.defaultBranch main
          git lfs install

      - name: Ensure entrypoint.sh has LF line endings
        run: |
          # Force LF endings so the Linux container can execute it correctly
          sed -i 's/\r//' entrypoint.sh
          sed -i 's/\r//' deploy/huggingface/hf_health_server.py
          echo "✅ Line endings normalised to LF"

      - name: Prepare deploy directory
        run: |
          mkdir -p "$DEPLOY_DIR"
          # Copy source, excluding dev-only and binary assets
          rsync -av \
            --exclude='.git' --exclude='.github' --exclude='.venv' \
            --exclude='node_modules' --exclude='logs' --exclude='.pytest_cache' \
            --exclude='.mypy_cache' --exclude='.ruff_cache' --exclude='htmlcov' \
            --exclude='staticfiles' --exclude='scratch' --exclude='media' \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='*.sqlite3' --exclude='*.db' \
            --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' \
            --exclude='*.webp' --exclude='*.gif' --exclude='*.ico' \
            --exclude='*.zip' --exclude='*.gz' --exclude='*.tar' \
            ./ "$DEPLOY_DIR/"

      - name: Inject API v1 Dockerfile and README
        run: |
          # Use the dedicated api-v1 Dockerfile (no Ollama, faster build)
          cp deploy/huggingface-api-v1/Dockerfile.production "$DEPLOY_DIR/Dockerfile"
          cp deploy/huggingface-api-v1/README.md "$DEPLOY_DIR/README.md"
          echo "✅ API v1 Dockerfile and README injected"

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd "$DEPLOY_DIR"
          git init
          git checkout -b main
          git config user.name "FASHIONISTAR CI/CD"
          git config user.email "fashionistar.home.beauty@gmail.com"
          git add -A
          git add -f Dockerfile
          git commit -m "🚀 API v1 Deploy: ${{ github.sha }} [GitHub Actions]"
          git remote add hf "https://__token__:${HF_TOKEN}@huggingface.co/spaces/${SPACE_ID}"
          git push hf main --force
          echo "✅ API Gateway pushed to: https://huggingface.co/spaces/${SPACE_ID}"

      - name: Poll build status & health check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "⏳ Polling HF for build completion (max 15min)..."
          for i in $(seq 1 60); do
            STATUS=$(curl -sf -H "Authorization: Bearer ${HF_TOKEN}" \
              "https://huggingface.co/api/spaces/${SPACE_ID}" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('runtime',{}).get('stage','unknown'))" 2>/dev/null || echo "unknown")
            echo "  [${i}/60] Build status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "🎉 API v1 is RUNNING!"
              sleep 5
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
                "${SPACE_URL}/api/v1/health/" || echo "000")
              echo "  Health check → HTTP $HTTP"
              break
            elif [ "$STATUS" = "BUILD_ERROR" ] || [ "$STATUS" = "RUNTIME_ERROR" ]; then
              echo "❌ Build FAILED (status=$STATUS)"
              echo "   Logs: https://huggingface.co/spaces/${SPACE_ID}"
              exit 1
            fi
            sleep 15
          done

  # ── Job 2: Deploy Celery Beat (fashionistar-celery-beat) ───────────────────
  deploy-celery-beat:
    name: ⏰ Celery Beat → fashionistar-celery-beat
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [integration-tests]
    if: |
      always() &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'celery-beat' || github.event_name == 'push')

    env:
      SPACE_ID: fashionistar/fashionistar-celery-beat
      SPACE_URL: https://fashionistar-fashionistar-celery-beat.hf.space
      DEPLOY_DIR: /tmp/hf_beat_deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Configure git
        run: |
          git config --global user.email "fashionistar.home.beauty@gmail.com"
          git config --global user.name "FASHIONISTAR CI/CD"
          git config --global init.defaultBranch main
          git lfs install

      - name: Ensure LF line endings
        run: sed -i 's/\r//' entrypoint.sh deploy/huggingface/hf_health_server.py

      - name: Prepare deploy directory
        run: |
          mkdir -p "$DEPLOY_DIR"
          rsync -av \
            --exclude='.git' --exclude='.github' --exclude='.venv' \
            --exclude='node_modules' --exclude='logs' --exclude='.pytest_cache' \
            --exclude='.mypy_cache' --exclude='.ruff_cache' --exclude='htmlcov' \
            --exclude='staticfiles' --exclude='scratch' --exclude='media' \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='*.sqlite3' --exclude='*.db' \
            --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' \
            --exclude='*.webp' --exclude='*.gif' --exclude='*.ico' \
            --exclude='*.zip' --exclude='*.gz' --exclude='*.tar' \
            ./ "$DEPLOY_DIR/"

      - name: Inject Celery Beat Dockerfile and README
        run: |
          cp deploy/huggingface-celery-beat/Dockerfile.production "$DEPLOY_DIR/Dockerfile"
          cp deploy/huggingface-celery-beat/README.md "$DEPLOY_DIR/README.md"
          echo "✅ Celery Beat Dockerfile and README injected"

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd "$DEPLOY_DIR"
          git init
          git checkout -b main
          git config user.name "FASHIONISTAR CI/CD"
          git config user.email "fashionistar.home.beauty@gmail.com"
          git add -A
          git add -f Dockerfile
          git commit -m "⏰ Celery Beat Deploy: ${{ github.sha }} [GitHub Actions]"
          git remote add hf "https://__token__:${HF_TOKEN}@huggingface.co/spaces/${SPACE_ID}"
          git push hf main --force
          echo "✅ Celery Beat pushed to: https://huggingface.co/spaces/${SPACE_ID}"

      - name: Poll build status
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "⏳ Polling HF for build completion (max 10min)..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf -H "Authorization: Bearer ${HF_TOKEN}" \
              "https://huggingface.co/api/spaces/${SPACE_ID}" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('runtime',{}).get('stage','unknown'))" 2>/dev/null || echo "unknown")
            echo "  [${i}/40] Build status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then echo "🎉 Celery Beat RUNNING!"; break; fi
            if [ "$STATUS" = "BUILD_ERROR" ] || [ "$STATUS" = "RUNTIME_ERROR" ]; then
              echo "❌ Build failed: $STATUS"; exit 1; fi
            sleep 15
          done

  # ── Job 3: Deploy Celery Queues ZeroGPU (fashionistar-celery-queues) ────────
  deploy-celery-queues:
    name: 🔄 Celery Worker → fashionistar-celery-queues (ZeroGPU)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [integration-tests]
    if: |
      always() &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'celery-queues' || github.event_name == 'push')

    env:
      SPACE_ID: fashionistar/fashionistar-celery-queues
      SPACE_URL: https://fashionistar-fashionistar-celery-queues.hf.space
      DEPLOY_DIR: /tmp/hf_queues_deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Configure git
        run: |
          git config --global user.email "fashionistar.home.beauty@gmail.com"
          git config --global user.name "FASHIONISTAR CI/CD"
          git config --global init.defaultBranch main
          git lfs install

      - name: Ensure LF line endings
        run: sed -i 's/\r//' entrypoint.sh deploy/huggingface/hf_health_server.py

      - name: Prepare deploy directory
        run: |
          mkdir -p "$DEPLOY_DIR"
          rsync -av \
            --exclude='.git' --exclude='.github' --exclude='.venv' \
            --exclude='node_modules' --exclude='logs' --exclude='.pytest_cache' \
            --exclude='.mypy_cache' --exclude='.ruff_cache' --exclude='htmlcov' \
            --exclude='staticfiles' --exclude='scratch' --exclude='media' \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='*.sqlite3' --exclude='*.db' \
            --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' \
            --exclude='*.webp' --exclude='*.gif' --exclude='*.ico' \
            --exclude='*.zip' --exclude='*.gz' --exclude='*.tar' \
            ./ "$DEPLOY_DIR/"

      - name: Inject Celery Queues Dockerfile and README
        run: |
          cp deploy/huggingface-celery-queues/Dockerfile.production "$DEPLOY_DIR/Dockerfile"
          cp deploy/huggingface-celery-queues/README.md "$DEPLOY_DIR/README.md"
          echo "✅ Celery Queues Dockerfile and README injected"

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd "$DEPLOY_DIR"
          git init
          git checkout -b main
          git config user.name "FASHIONISTAR CI/CD"
          git config user.email "fashionistar.home.beauty@gmail.com"
          git add -A
          git add -f Dockerfile
          git commit -m "🔄 Celery Queues Deploy: ${{ github.sha }} [GitHub Actions]"
          git remote add hf "https://__token__:${HF_TOKEN}@huggingface.co/spaces/${SPACE_ID}"
          git push hf main --force
          echo "✅ Celery Worker pushed to: https://huggingface.co/spaces/${SPACE_ID}"

      - name: Poll build status
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "⏳ Polling HF for build completion (max 10min)..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf -H "Authorization: Bearer ${HF_TOKEN}" \
              "https://huggingface.co/api/spaces/${SPACE_ID}" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('runtime',{}).get('stage','unknown'))" 2>/dev/null || echo "unknown")
            echo "  [${i}/40] Build status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then echo "🎉 Celery Queues RUNNING!"; break; fi
            if [ "$STATUS" = "BUILD_ERROR" ] || [ "$STATUS" = "RUNTIME_ERROR" ]; then
              echo "❌ Build failed: $STATUS"; exit 1; fi
            sleep 15
          done

  # ── Job 4: Deploy AI Engine ZeroGPU (fashionistar-ai-engine) ───────────────
  deploy-ai-engine:
    name: 🤖 AI Engine → fashionistar-ai-engine (ZeroGPU)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-tests]
    if: |
      always() &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'ai-engine' || github.event_name == 'push')

    env:
      SPACE_ID: fashionistar/fashionistar-ai-engine
      SPACE_URL: https://fashionistar-fashionistar-ai-engine.hf.space
      DEPLOY_DIR: /tmp/hf_ai_engine_deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Configure git
        run: |
          git config --global user.email "fashionistar.home.beauty@gmail.com"
          git config --global user.name "FASHIONISTAR CI/CD"
          git config --global init.defaultBranch main

      - name: Ensure HF space exists (create if missing)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            "https://huggingface.co/api/spaces/${SPACE_ID}" || echo "000")
          if [ "$HTTP" = "404" ]; then
            echo "📦 Creating ZeroGPU space: ${SPACE_ID}"
            curl -sf -X POST \
              -H "Authorization: Bearer ${HF_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://huggingface.co/api/repos/create" \
              -d "{
                \"type\": \"space\",
                \"name\": \"fashionistar-ai-engine\",
                \"organization\": \"fashionistar\",
                \"sdk\": \"gradio\",
                \"hardware\": \"zero-gpu\",
                \"private\": false,
                \"license\": \"mit\"
              }"
            echo "✅ Space created!"
          else
            echo "✅ Space already exists (HTTP $HTTP)"
          fi

      - name: Prepare AI Engine deploy directory
        run: |
          mkdir -p "$DEPLOY_DIR"
          # Copy all AI engine files to deploy dir
          cp deploy/huggingface-ai-engine/app.py           "$DEPLOY_DIR/app.py"
          cp deploy/huggingface-ai-engine/requirements.txt  "$DEPLOY_DIR/requirements.txt"
          cp deploy/huggingface-ai-engine/zerogpu_engine.py "$DEPLOY_DIR/zerogpu_engine.py"
          cp deploy/huggingface-ai-engine/packages.txt      "$DEPLOY_DIR/packages.txt"
          cp deploy/huggingface-ai-engine/README.md         "$DEPLOY_DIR/README.md" || true
          echo "✅ AI Engine files prepared:"
          ls -lh "$DEPLOY_DIR/"

      - name: Push LLM API key secrets to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          # Helper: push a single secret to the HF Space
          push_secret() {
            local key="$1" val="$2"
            [ -z "$val" ] && echo "  ⏭  $key not set, skipping" && return
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${HF_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://huggingface.co/api/spaces/${SPACE_ID}/secrets" \
              -d "{\"key\":\"$key\",\"value\":\"$val\"}" || echo "000")
            echo "  ${key}: HTTP $HTTP"
          }
          echo "🔑 Syncing secrets to HF Space: ${SPACE_ID}"
          push_secret "GROQ_API_KEY"       "$GROQ_API_KEY"
          push_secret "SAMBANOVA_API_KEY"  "$SAMBANOVA_API_KEY"
          push_secret "CEREBRAS_API_KEY"   "$CEREBRAS_API_KEY"
          push_secret "RESEND_API_KEY"     "$RESEND_API_KEY"
          echo "✅ Secrets pushed"

      - name: Push files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd "$DEPLOY_DIR"
          git init
          git checkout -b main
          git config user.name "FASHIONISTAR CI/CD"
          git config user.email "fashionistar.home.beauty@gmail.com"
          git add -A
          git commit -m "🤖 AI Engine v3.0.0: ZeroGPU + SambaNova/Cerebras/Groq waterfall — ${{ github.sha }}"
          git remote add hf "https://user:${HF_TOKEN}@huggingface.co/spaces/${SPACE_ID}"
          git push hf main --force
          echo "✅ AI Engine pushed to: https://huggingface.co/spaces/${SPACE_ID}"

      - name: Poll build status (max 10 min)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "⏳ Polling HF for build completion (max 10 min)..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf -H "Authorization: Bearer ${HF_TOKEN}" \
              "https://huggingface.co/api/spaces/${SPACE_ID}" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('runtime',{}).get('stage','unknown'))" 2>/dev/null || echo "unknown")
            echo "  [${i}/40] Build status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then echo "🎉 AI Engine RUNNING!"; break; fi
            if [ "$STATUS" = "BUILD_ERROR" ] || [ "$STATUS" = "RUNTIME_ERROR" ]; then
              echo "❌ Build failed: $STATUS"; exit 1; fi
            sleep 15
          done

      - name: Warmup AI Engine (pre-allocate ZeroGPU memory)
        continue-on-error: true
        run: |
          echo "🔥 Warming up AI Engine ZeroGPU allocation..."
          sleep 30  # Give Gradio 30s to fully initialize
          # Warmup: hit health_check endpoint
          for attempt in 1 2 3; do
            STATUS=$(curl -sf -w "\n%{http_code}" \
              -X POST "${SPACE_URL}/run/health_check" \
              -H "Content-Type: application/json" \
              -d '{"data": []}' 2>/dev/null || echo "error")
            HTTP=$(echo "$STATUS" | tail -1)
            echo "  [Warmup $attempt] HTTP: $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ AI Engine warmed up successfully!"
              break
            fi
            sleep 15
          done

  # ── Job 5: Final Summary ────────────────────────────────────────────────────
  summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-api-v1, deploy-celery-beat, deploy-celery-queues, deploy-ai-engine]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo "  🎀 FASHIONISTAR — HF 4-Space Deployment Summary"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "  PRODUCTION URLS:"
          echo "  ─────────────────────────────────────────────────────────"
          echo "  API Gateway:   https://fashionistar-fashionistar-api-v1.hf.space"
          echo "  Health Check:  https://fashionistar-fashionistar-api-v1.hf.space/api/v1/health/"
          echo "  AI Health:     https://fashionistar-fashionistar-api-v1.hf.space/api/v1/ninja/ai/health/"
          echo "  API Docs:      https://fashionistar-fashionistar-api-v1.hf.space/api/docs/"
          echo ""
          echo "  SPACES:"
          echo "  ─────────────────────────────────────────────────────────"
          echo "  fashionistar-api-v1:        ${{ needs.deploy-api-v1.result }}"
          echo "  fashionistar-celery-beat:   ${{ needs.deploy-celery-beat.result }}"
          echo "  fashionistar-celery-queues: ${{ needs.deploy-celery-queues.result }}"
          echo "  fashionistar-ai-engine:     ${{ needs.deploy-ai-engine.result }}"
          echo ""
          echo "  COMMIT:        ${{ github.sha }}"
          echo "  TRIGGERED BY:  ${{ github.actor }}"
          echo "══════════════════════════════════════════════════════════════"
