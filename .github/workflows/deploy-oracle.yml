name: 🚀 Deploy API to Oracle Cloud (Production)

# ============================================================================
# Deploys the Django ASGI API to Oracle Cloud Always Free VM
#
# Triggered: push to main (Python/Docker/deploy file changes only)
# Target:    Oracle Cloud VM.Standard.A1.Flex (ARM64 / linux/arm64)
# Registry:  GitHub Container Registry (ghcr.io)
#
# Tools used:
#   - docker buildx   → Multi-arch (ARM64 + AMD64) image builds
#   - appleboy/ssh    → Zero-downtime rolling deploy via SSH
#   - OCI CLI         → (optional) query instance health metrics
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.production'
      - 'gunicorn.conf.py'
      - 'entrypoint.sh'
      - 'deploy/**'
      - '.github/workflows/deploy-oracle.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      force_rebuild:
        description: 'Force Docker image rebuild (skip cache)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  PYTHON_VERSION: "3.13"

jobs:
  # ── Job 1: Run tests before deploying ─────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: fashionistar_test
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_DB: fashionistar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install uv
        run: pip install uv --quiet

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run critical test suite (fast — excludes E2E and stress)
        env:
          DATABASE_URL: postgres://fashionistar_test:test_password_ci@localhost:5432/fashionistar_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: ci-test-secret-key-not-for-production-use
          DJANGO_SETTINGS_MODULE: backend.config.test
        run: |
          uv run pytest tests/ -x --tb=short -q --timeout=30 \
            --ignore=tests/e2e/ \
            --ignore=tests/stress/ \
            -m "not slow and not integration" \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ── Job 2: Build & Push ARM64 Docker image ─────────────────────────────────
  build:
    name: 🏗️ Build ARM64 + AMD64 Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT

      - name: Set up QEMU (ARM64 cross-compilation on GitHub AMD64 runners)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}

      - name: Build and push multi-arch image (ARM64 + AMD64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          # Build ARM64 for Oracle Cloud + AMD64 for local dev/CI
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event.inputs.force_rebuild == 'true' }}
          build-args: |
            PYTHON_VERSION=3.13-slim
            UV_IMAGE_TAG=0.8.22
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Print image digest
        run: echo "✅ Image pushed with digest ${{ steps.build.outputs.digest }}"

  # ── Job 3: Deploy to Oracle Cloud VM ────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: [test, build]
    timeout-minutes: 20
    environment:
      name: production
      url: https://api.fashionistar.net

    steps:
      - uses: actions/checkout@v4

      # ── SSH Deploy (Zero-Downtime Rolling Update) ──────────────────────────
      - name: Deploy via SSH to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          timeout: "300s"
          script: |
            set -e
            echo "🔄 Starting FASHIONISTAR deployment on Oracle Cloud..."
            echo "   Commit: ${{ github.sha }}"
            echo "   Branch: ${{ github.ref_name }}"

            # Navigate to project directory
            cd /home/ubuntu/fashionistar_backend

            # Pull latest code
            git fetch --all
            git reset --hard origin/main
            echo "✅ Code updated"

            # Authenticate to GHCR to pull latest new Docker image (ARM64 from GHCR)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new ARM64 image
            export IMAGE_TAG=sha-$(echo "${{ github.sha }}" | head -c 7)
            export GITHUB_REPOSITORY=${{ github.repository }}
            docker compose -f docker-compose.production.yml pull api
            echo "✅ New image pulled: $IMAGE_TAG"

            # Zero-downtime rolling update (replace api container, keep nginx+redis alive)
            docker compose -f docker-compose.production.yml up -d --no-deps --remove-orphans api
            echo "✅ API container updated"

            # Wait for new container to pass health check
            echo "⏳ Waiting for API health check..."
            for i in $(seq 1 12); do
              if docker compose -f docker-compose.production.yml exec -T api \
                  curl -fsS http://127.0.0.1:8001/health/ > /dev/null 2>&1; then
                echo "✅ API container healthy!"
                break
              fi
              echo "  Attempt $i/12 — waiting 5s..."
              sleep 5
              if [ "$i" -eq 12 ]; then
                echo "❌ API did not become healthy — rolling back!"
                docker compose -f docker-compose.production.yml down --rmi local api || true
                exit 1
              fi
            done

            # Run database migrations (safe to run multiple times)
            docker compose -f docker-compose.production.yml exec -T api \
              python manage.py migrate --settings=backend.config.production --no-input
            echo "✅ Migrations complete"

            # Collect static files
            docker compose -f docker-compose.production.yml exec -T api \
              python manage.py collectstatic --noinput --settings=backend.config.production
            echo "✅ Static files collected"

            # Clean up old/dangling images to free disk space
            docker image prune -f

            echo "🎉 Oracle Cloud deployment complete!"

      # ── External Health Check ──────────────────────────────────────────────
      - name: External health check
        run: |
          echo "⏳ Waiting 15s for service stabilization..."
          sleep 15
          for i in 1 2 3 4 5; do
            echo "  Attempt $i/5..."
            if curl -fsS https://api.fashionistar.net/health/; then
              echo "✅ External health check PASSED!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ External health check FAILED after 5 attempts"
          exit 1

      # ── Notify on Success ──────────────────────────────────────────────────
      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 FASHIONISTAR API deployed successfully!"
          echo "   URL: https://api.fashionistar.net"
          echo "   Commit: ${{ github.sha }}"
          echo "   Actor: ${{ github.actor }}"

      # ── Notify on Failure ──────────────────────────────────────────────────
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "🚨 FASHIONISTAR Oracle Cloud deployment FAILED!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Actor: ${{ github.actor }}"
          echo "   Check logs at: https://github.com/${{ github.repository }}/actions"
