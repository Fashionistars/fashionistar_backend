name: 🚀 Deploy API to Oracle Cloud (Production)

# ============================================================================
# Deploys the Django ASGI API to Oracle Cloud Always Free VM
# Triggered on: push to main (backend changes only)
# Target:       Oracle Cloud VM.Standard.A1.Flex (ARM64 / linux/arm64)
# Registry:     GitHub Container Registry (ghcr.io)
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.production'
      - 'gunicorn.conf.py'
      - 'deploy/**'
      - '.github/workflows/deploy-oracle.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  PYTHON_VERSION: "3.13"

jobs:
  # ── Job 1: Run tests before deploying ─────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: fashionistar_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fashionistar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run critical tests (fast suite)
        env:
          DATABASE_URL: postgres://fashionistar_test:test_password@localhost:5432/fashionistar_test
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/2
          SECRET_KEY: test-secret-key-ci-only
          DJANGO_SETTINGS_MODULE: backend.config.test
        run: |
          uv run pytest tests/ -x --tb=short -q --timeout=30 \
            --ignore=tests/e2e/ \
            --ignore=tests/stress/ \
            -m "not slow and not integration"

  # ── Job 2: Build & Push ARM64 Docker image ─────────────────────────────────
  build:
    name: 🏗️ Build ARM64 Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-compilation on GitHub's AMD64 runners)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ARM64 image (+ AMD64 for registry)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          # Build ARM64 for Oracle Cloud + AMD64 for local dev/CI
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=3.13-slim
            UV_IMAGE_TAG=0.8.22

      - name: Print image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

  # ── Job 3: Deploy to Oracle Cloud VM ──────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: [test, build]
    timeout-minutes: 20
    environment:
      name: production
      url: https://api.fashionistar.net

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          timeout: "300s"
          script: |
            set -e
            echo "🔄 Starting FASHIONISTAR deployment on Oracle Cloud..."

            # Navigate to project directory
            cd /home/ubuntu/fashionistar_backend

            # Pull latest code
            git pull origin main

            # Pull new Docker image (ARM64 from GHCR)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull api

            # Zero-downtime rolling update for API
            docker compose -f docker-compose.production.yml up -d --no-deps --build api

            # Run database migrations
            docker compose -f docker-compose.production.yml exec -T api \
              python manage.py migrate --settings=backend.config.production --no-input

            # Collect static files
            docker compose -f docker-compose.production.yml exec -T api \
              python manage.py collectstatic --noinput --settings=backend.config.production

            # Clean up old images
            docker image prune -f

            echo "✅ Oracle Cloud deployment complete!"

      - name: Health Check
        run: |
          echo "Waiting 20s for API to initialize..."
          sleep 20
          for i in 1 2 3 4 5; do
            if curl -fsS https://api.fashionistar.net/health/ ; then
              echo "✅ API health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "🚨 FASHIONISTAR Oracle Cloud deployment FAILED on commit ${{ github.sha }}"
          # Add Slack/email notification here if needed
