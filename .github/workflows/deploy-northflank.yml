name: 🔄 Deploy Celery to Northflank (Production)

# ============================================================================
# Deploys the Celery worker to Northflank Free Sandbox
# Triggered on: push to main (backend changes only)
# Target:       Northflank deployment service (linux/amd64)
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.celery'
      - 'northflank.json'
      - '.github/workflows/deploy-northflank.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/celery-worker

jobs:
  # ── Build Celery Worker image ───────────────────────────────────────────────
  build:
    name: 🏗️ Build Celery Worker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Celery worker image (AMD64 — Northflank default)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.celery
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=3.13-slim
            UV_IMAGE_TAG=0.8.22

  # ── Deploy to Northflank ────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Northflank
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment:
      name: production-workers

    steps:
      - name: Trigger Northflank deployment
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: fashionistar-celery-worker
        run: |
          echo "🔄 Triggering Northflank Celery worker deployment..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${NORTHFLANK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"deployment\",
              \"imageTag\": \"sha-$(echo ${{ github.sha }} | head -c 7)\"
            }" \
            "https://api.northflank.com/v1/projects/${NORTHFLANK_PROJECT_ID}/services/${NORTHFLANK_SERVICE_ID}/deployment")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Northflank deployment triggered successfully!"
          else
            echo "❌ Northflank deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Wait for Northflank deployment to complete
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
        run: |
          echo "Waiting 30s for Northflank deployment to stabilize..."
          sleep 30
          echo "✅ Northflank Celery worker deployment complete!"
