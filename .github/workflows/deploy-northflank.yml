name: 🔄 Deploy Celery Workers to Northflank (Production)

# ============================================================================
# Deploys the Celery worker + Celery Beat to Northflank Free Sandbox
#
# Triggered: push to main (Python/Celery/Dockerfile.celery changes)
# Target:    Northflank DeploymentService (linux/amd64)
# Registry:  GitHub Container Registry (ghcr.io)
#
# Tools used:
#   - @northflank/cli  → Official Northflank CLI for service management
#   - docker buildx    → AMD64 Celery image build
#   - Northflank API   → REST API to trigger deployment + verify status
#
# Northflank CLI commands used:
#   northflank login
#   northflank list services
#   northflank get service
#
# Northflank API endpoints used:
#   POST /v1/projects/{id}/services/{id}/deployment → trigger deploy
#   GET  /v1/projects/{id}/services/{id}            → verify status
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile.celery'
      - 'northflank.json'
      - 'entrypoint.sh'
      - '.github/workflows/deploy-northflank.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force Docker image rebuild (skip cache)'
        required: false
        default: 'false'
        type: boolean
      service_id:
        description: 'Northflank service ID to deploy (default: fashionistar-celery-worker)'
        required: false
        default: 'fashionistar-celery-worker'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/celery-worker

jobs:

  # ── Job 1: Build Celery Worker Image (AMD64 — Northflank's platform) ─────────
  build:
    name: 🏗️ Build Celery Worker Image (AMD64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Celery worker image (AMD64 — Northflank native)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.celery
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event.inputs.force_rebuild == 'true' }}
          build-args: |
            PYTHON_VERSION=3.13-slim
            UV_IMAGE_TAG=0.8.22

      - name: Print build info
        run: |
          echo "✅ Celery worker image built"
          echo "   Tags: ${{ steps.meta.outputs.tags }}"
          echo "   Digest: ${{ steps.build.outputs.digest }}"

  # ── Job 2: Deploy to Northflank via CLI + API ───────────────────────────────
  deploy:
    name: 🚀 Deploy to Northflank (CLI + REST API)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment:
      name: production-workers

    steps:
      - uses: actions/checkout@v4

      # ── Install Northflank CLI ─────────────────────────────────────────────
      - name: Install Northflank CLI
        run: |
          npm install -g @northflank/cli --quiet
          northflank --version

      # ── Trigger Northflank Deployment via REST API ─────────────────────────
      # (Using REST API for deployment trigger — CLI login requires interactive OAuth)
      - name: Trigger Northflank deployment (Celery worker)
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          SERVICE_ID: ${{ github.event.inputs.service_id || 'fashionistar-celery-worker' }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: |
          echo "🔄 Triggering Northflank deployment..."
          echo "   Project: $NORTHFLANK_PROJECT_ID"
          echo "   Service: $SERVICE_ID"
          echo "   Image tag: sha-$SHORT_SHA"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${NORTHFLANK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"deployment\",
              \"imageTag\": \"sha-${SHORT_SHA}\"
            }" \
            "https://api.northflank.com/v1/projects/${NORTHFLANK_PROJECT_ID}/services/${SERVICE_ID}/deployment")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "   HTTP Response: $HTTP_CODE"
          echo "   Body: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Northflank deployment triggered successfully!"
          else
            echo "❌ Northflank deployment trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      # ── Verify Deployment Status ───────────────────────────────────────────
      - name: Verify Northflank deployment status
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          SERVICE_ID: ${{ github.event.inputs.service_id || 'fashionistar-celery-worker' }}
        run: |
          echo "⏳ Polling Northflank service status (60s timeout)..."
          for i in $(seq 1 12); do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${NORTHFLANK_API_KEY}" \
              "https://api.northflank.com/v1/projects/${NORTHFLANK_PROJECT_ID}/services/${SERVICE_ID}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('status','unknown'))" 2>/dev/null || echo "unknown")

            echo "  Attempt $i/12 — Service status: $STATUS"

            if [ "$STATUS" = "running" ]; then
              echo "✅ Celery worker is RUNNING on Northflank!"
              break
            elif [ "$STATUS" = "error" ] || [ "$STATUS" = "failed" ]; then
              echo "❌ Northflank service in error state: $STATUS"
              exit 1
            fi

            sleep 5
          done

      # ── Notify on Success ──────────────────────────────────────────────────
      - name: Notify success
        if: success()
        run: |
          echo "🎉 FASHIONISTAR Celery worker deployed to Northflank!"
          echo "   Image: sha-${{ needs.build.outputs.short_sha }}"
          echo "   Commit: ${{ github.sha }}"

      # ── Notify on Failure ──────────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "🚨 FASHIONISTAR Northflank Celery deployment FAILED!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Logs: https://app.northflank.com"
